on:
  workflow_call:
    inputs:
      image-name:
        description: 'Nombre de la imagen Docker a construir'
        required: true
        type: string
      image-tag:
        description: 'Tag de la imagen'
        required: false
        default: 'latest'
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push
        run: |
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-api:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/my-api:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/my-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/my-api:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/my-api:latest

